name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  validate-branch-name:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name pattern
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ ! "$BRANCH" =~ ^session/[0-9]{3}$ ]]; then
            echo "ERROR: Branch name '$BRANCH' does not match required pattern 'session/NNN' (e.g. session/001)"
            exit 1
          fi
          echo "Branch name '$BRANCH' is valid."

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release tag from merged branch
        id: tag
        run: |
          # Get the branch name from the most recent merge commit
          MERGE_COMMIT=$(git log -1 --pretty=%H)
          BRANCH=$(git log -1 --pretty=%s | grep -oP 'session/\K[0-9]{3}' || true)

          if [ -z "$BRANCH" ]; then
            # Fallback: try to find from the merge commit parents
            BRANCH=$(git log --merges -1 --pretty="%s" | grep -oP 'session/\K[0-9]{3}' || true)
          fi

          if [ -z "$BRANCH" ]; then
            echo "ERROR: Could not determine session number from merge commit message."
            echo "Merge commit message: $(git log -1 --pretty=%s)"
            exit 1
          fi

          TAG="session-${BRANCH}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing as tag: $TAG"

      - name: Create tarball
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git archive --format=tar.gz --prefix="${TAG}/" HEAD -o "${TAG}.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: ${{ steps.tag.outputs.tag }}.tar.gz
          generate_release_notes: false
